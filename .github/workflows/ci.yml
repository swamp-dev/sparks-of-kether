name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
# Saves minutes on iterative PR pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Path-filter signal: which categories of file did this push touch?
  # Downstream jobs gate on these so docs-only / agent-config-only PRs
  # skip the heavy jobs (build/e2e/integration) without sacrificing
  # the verify safety net. `verify` always runs because typecheck and
  # the unit suite catch more than just runtime regressions and they
  # are cheap.
  #
  # `.claude/skills/ship-ticket/SKILL.md` step 4 documents how the
  # merge gate interprets `skipped` here: a job that skips because
  # its filter didn't match counts as success-equivalent, provided
  # `verify` and `changes` both passed.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Compute path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Workflow + lockfile changes are self-validation triggers:
            # any change to CI itself or to the dep graph should run
            # every job as a safety net.
            code:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'engine/**'
              - 'data/**'
              - 'tests/**'
              - 'test/**'
              - '__tests__/**'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vitest.config.*'
              - 'playwright.config.*'
              - '.github/workflows/**'
            e2e:
              - 'app/**'
              - 'components/**'
              - 'engine/**'
              - 'lib/**'
              - 'e2e/**'
              - 'public/**'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'playwright.config.*'
              - '.github/workflows/**'
            integration:
              - 'lib/db/**'
              - 'supabase/**'
              - 'tests/integration/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

  verify:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Matches packageManager pinned in package.json.
          version: 10.33.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test + coverage (vitest --coverage)
        # `vitest run --coverage` is a superset of `vitest run` — it
        # executes the full suite AND collects coverage in a single
        # pass. Threshold values live in `vitest.config.ts`. A
        # regression below the global baseline trips this step.
        # The HTML report is uploaded as an artifact below.
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [verify, changes]
    # Skip when no runtime/build files changed. `verify` already
    # typechecks; `next build` would only re-discover what tsc + lint
    # covered.
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Keep in sync with packageManager field in package.json.
          version: 10.33.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Next.js build
        run: pnpm build

  e2e:
    name: end-to-end (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify, changes]
    # Skip when nothing user-facing changed. Routes/components/styles
    # are the only surfaces Playwright actually exercises.
    if: needs.changes.outputs.e2e == 'true'
    # Without this env var, every spec self-skips (see
    # `playwright.config.ts`). The runner installs chromium below so
    # the suite actually executes; previously CI ran no e2e at all
    # and `pnpm e2e` exited green with "2 skipped" — a silent gap
    # that masked PR breakage in the integration layer.
    env:
      PLAYWRIGHT_BROWSERS_INSTALLED: '1'

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # `--with-deps` pulls the system libs chromium needs on the
        # ubuntu-latest runner. Without it, the browser launch fails
        # with a libnss/libdrm error.
        run: pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  integration:
    name: real-Supabase integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify, changes]
    # Skip when nothing touches the DB layer or migrations. Booting
    # Supabase is the most expensive job; gating it on actual db
    # changes is the highest single per-PR savings.
    if: needs.changes.outputs.integration == 'true'

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        # Pinned to a specific minor for reproducibility — bump only
        # alongside a verified-green local-test pass.
        # Bumped from 1.226.4 to 2.98.2: the 1.x series does not recognise
        # db.major_version = 17 in supabase/config.toml (set in 69ab0bc).
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Start Supabase Local
        # `supabase start` boots the full local stack: Postgres +
        # GoTrue (auth) + PostgREST + Realtime — all in Docker.
        # Migrations from `supabase/migrations/` apply automatically.
        # `supabase db start` (just Postgres) is NOT enough; the
        # integration tests use `signInAnonymously` which needs
        # GoTrue.
        run: supabase start

      - name: Export Supabase env vars
        # `supabase status -o env` prints API_URL, ANON_KEY, and
        # SERVICE_ROLE_KEY in `KEY=value` form. Re-export under the
        # names the test setup expects.
        run: |
          supabase status -o env > /tmp/supabase.env
          set -a; source /tmp/supabase.env; set +a
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
          } >> "$GITHUB_ENV"

      - name: Run integration tests
        run: pnpm test:integration

      - name: Stop Supabase Local
        if: always()
        run: supabase stop --no-backup
